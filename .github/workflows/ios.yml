name: Build iOS App
on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Force Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.9.0 # Specific version to prevent auto-defaults
          cache: 'npm'

      - name: Verify Version
        run: node -v # This MUST print v22.x.x in the logs

      - name: Install Cordova
        run: npm install -g cordova@latest

      - name: Build
        run: |
          cordova platform add ios
          cordova build ios
