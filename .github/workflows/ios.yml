name: Build iOS App
on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Force Manual Node Upgrade
        run: |
          # Manually install Node 22 via Homebrew
          brew install node@22
          # Force the runner to prioritize this version over the built-in one
          echo "$(brew --prefix node@22)/bin" >> $GITHUB_PATH
          
      - name: Verify Fix
        run: |
          # If this doesn't show v22, the runner environment is locked
          node -v
          npm -v

      - name: Install Cordova and Skip Prompts
        run: |
          # Using --force to ignore engine warnings if they appear
          npm install -g cordova@latest --force
          # This command stops the "telemetry" crash you are seeing
          cordova telemetry off
          
      - name: Build App
        run: |
          cordova platform add ios
          cordova build ios
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: platforms/ios/build/
