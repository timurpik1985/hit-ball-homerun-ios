name: Build iOS App
on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Check Node version
      run: |
        node --version
        npm --version
        
    - name: Install Cordova 11
      run: npm install -g cordova@11.1.0
      
    - name: Check structure
      run: |
        ls -la
        ls -la www/
        
    - name: Add iOS platform
      run: cordova platform add ios@6.3.0
      
    - name: Build iOS
      run: cordova build ios --debug
      
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: ios-app
        path: platforms/ios/build/
