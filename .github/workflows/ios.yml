name: Build iOS App
on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-13
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node 20
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        
    - name: Install older Cordova
      run: npm install -g cordova@11.1.0
      
    - name: Check structure
      run: |
        echo "=== Files ==="
        ls -la
        echo "=== WWW folder ==="
        ls -la www/
        echo "=== Config ==="
        head -10 config.xml
        
    - name: Add iOS platform
      run: cordova platform add ios@6.3.0
      
    - name: Build iOS
      run: cordova build ios --debug
      
    - name: Upload
      uses: actions/upload-artifact@v3
      with:
        name: ios-app
        path: platforms/ios/build/
