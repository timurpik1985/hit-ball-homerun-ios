name: Build iOS App
on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-12
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Check Node version
      run: |
        node --version
        npm --version
        
    - name: Install old Cordova
      run: npm install -g cordova@10.0.0
        
    - name: Check files
      run: |
        ls -la
        ls -la www/
        
    - name: Add iOS platform
      run: cordova platform add ios@5.1.1
        
    - name: Build iOS
      run: cordova build ios
        
    - name: Upload
      uses: actions/upload-artifact@v3
      with:
        name: ios-app
        path: platforms/ios/build/
