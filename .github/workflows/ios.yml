name: Build iOS App
on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Force Node 22 (Manual Path)
        run: |
          # Use Homebrew to get the right version
          brew install node@22
          brew link --overwrite node@22
          # Force the terminal to see Node 22 first
          echo "$(brew --prefix node@22)/bin" >> $GITHUB_PATH
          
      - name: Verify Environment
        run: |
          echo "Node Version:"
          node -v
          echo "NPM Version:"
          npm -v

      - name: Install Cordova
        # The --force flag skips those 'Unsupported engine' warnings
        run: npm install -g cordova@latest --force

      - name: Build App
        # These environment variables stop Cordova from asking about telemetry
        env:
          CORDOVA_TELEMETRY_OPT_OUT: 1
          CI: true
        run: |
          # We check the version to make sure it's 13.x
          cordova --version
          # Add platform and build with the non-interactive flag
          cordova platform add ios --non-interactive
          cordova build ios --non-interactive
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: platforms/ios/build/
