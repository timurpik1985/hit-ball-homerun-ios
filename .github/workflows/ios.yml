name: Build iOS App
on:
  workflow_dispatch:

jobs:
  build-ios:
    # 'macos-latest' ensures you have the most up-to-date build tools
    runs-on: macos-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Using 20 as it's the current stable LTS

    - name: Check Environment
      run: |
        node --version
        npm --version
        
    - name: Install Cordova
      # I suggest trying the latest or a more recent version like 12
      # unless your code strictly requires 10.0.0
      run: npm install -g cordova@latest
        
    - name: Check files
      run: |
        ls -la
        ls -la www/ || echo "www folder not found!"
        
    - name: Add iOS platform
      # Note: ios@5.1.1 is very old (2019). 
      # Modern Xcode (on macos-latest) usually requires ios@7.x.x
      run: cordova platform add ios
        
    - name: Build iOS
      run: cordova build ios --device
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-app
        # Note: The build path often changes depending on Cordova version
        path: platforms/ios/build/device/
