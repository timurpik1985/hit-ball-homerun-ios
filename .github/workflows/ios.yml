name: Build iOS App
on:
  workflow_dispatch:
  
jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install Cordova
      run: |
        npm install -g cordova@12
        cordova telemetry off
        
    - name: Verify file structure
      run: |
        ls -la
        ls -la www/ || echo "www folder missing"
        
    - name: Setup iOS platform
      run: |
        cordova platform add ios@7.0.1
        cordova plugin add cordova-plugin-admob-free@0.26.0
        cordova plugin add cordova-plugin-whitelist@1.3.5
        
    - name: Build iOS app
      run: |
        cordova build ios --release --device
        
    - name: Upload iOS app
      uses: actions/upload-artifact@v4
      with:
        name: ios-app-build
        path: platforms/ios/build/
        retention-days: 30
