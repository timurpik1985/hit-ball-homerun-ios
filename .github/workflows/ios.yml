name: Build iOS App
on:
  workflow_dispatch:

jobs:
  build-ios:
    # Changed to latest to avoid deprecated hardware
    runs-on: macos-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Setup Node.js (Forced)
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        # This clears the cache to ensure no old version conflicts
        check-latest: true 

    - name: Verify Environment
      run: |
        echo "Node version:" && node -v
        echo "NPM version:" && npm -v
        
    - name: Install Cordova
      # Using --force ignores the engine warnings if they persist
      # but Node 22 should solve it naturally
      run: npm install -g cordova@latest --force
        
    - name: Add iOS platform
      # I strongly recommend removing the version @5.1.1 
      # Modern macOS/Xcode cannot build iOS 5.1.1
      run: cordova platform add ios
        
    - name: Build iOS
      # Added 'allow-root' just in case of permission hiccups on the runner
      run: cordova build ios --verbose
        
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: ios-app
        path: platforms/ios/build/
