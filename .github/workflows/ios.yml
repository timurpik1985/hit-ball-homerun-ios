name: Build iOS App
on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          # This forces GitHub to ignore any local .nvmrc or .node-version files
          always-auth: false 

      - name: Install Cordova
        # We use --force to tell npm to stop worrying about the engine warnings
        run: npm install -g cordova@latest --force

      - name: Build iOS
        # Instead of running a 'telemetry' command, we use this Environment Variable.
        # It tells Cordova to be quiet without crashing the build.
        env:
          CORDOVA_TELEMETRY_OPT_OUT: 1
        run: |
          cordova platform add ios
          cordova build ios
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: platforms/ios/build/
