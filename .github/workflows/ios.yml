name: Build iOS App
on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          # This ensures we don't accidentally pull a version from a local file
          check-latest: true 

      - name: Debug Environment
        run: |
          echo "Checking Node location: $(which node)"
          echo "Version: $(node -v)"

      - name: Install Cordova
        run: npm install -g cordova@latest --force

      - name: Prepare and Build
        # This ENV line tells Cordova to opt-out of telemetry without needing a command
        env:
          CORDOVA_TELEMETRY_OPT_OUT: 1
        run: |
          cordova platform add ios --verbose
          cordova build ios --verbose

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: platforms/ios/build/
