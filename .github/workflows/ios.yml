name: Build iOS App
on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Force Node 22 (The Sledgehammer)
        run: |
          # Uninstall any local versions that might be clashing
          brew uninstall --ignore-dependencies node || true
          brew install node@22
          brew link --overwrite node@22
          # Force the PATH to only see our new Node
          echo "/usr/local/opt/node@22/bin" >> $GITHUB_PATH
          
      - name: Verify Fix
        run: |
          echo "Checking Node Version..."
          node -v # This MUST say v22.x.x
          npm -v

      - name: Install Cordova with Force
        run: |
          # --force ignores the engine warnings so the install completes
          npm install -g cordova@latest --force
          # This line fixes the 'telemetry' error that crashed your last run
          cordova telemetry off 
          
      - name: Build App
        run: |
          cordova platform add ios
          cordova build ios
          
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: platforms/ios/build/
