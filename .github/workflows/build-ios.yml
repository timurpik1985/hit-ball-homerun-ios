name: Build iOS App
on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Force Fix Node Path
        run: |
          # 1. Force the system to use Node 20/22 from Homebrew
          brew install node@20
          brew link --overwrite node@20
          echo "$(brew --prefix node@20)/bin" >> $GITHUB_PATH
          
          # 2. KILL any existing cordova config that triggers the bug
          rm -rf ~/.cordova
          rm -rf ~/.config/configstore/cordova-config.json

      - name: Install Stable Cordova
        # We are downgrading to Cordova 12.0.0. 
        # Why? Because Cordova 13 + Node 18 = The 'Telemetry' Crash.
        # Cordova 12 is perfectly compatible with your config.xml.
        run: |
          npm install -g cordova@12.0.0 --force

      - name: Build App
        env:
          CORDOVA_TELEMETRY_OPT_OUT: 1
        run: |
          # Use --no-telemetry as a hidden flag to bypass the check
          cordova platform add ios --non-interactive
          cordova build ios --non-interactive

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: platforms/ios/build/
