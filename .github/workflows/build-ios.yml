name: Build and Sign iOS App
on:
  workflow_dispatch:
jobs:
  build-ios:
    runs-on: macos-15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Select Xcode 26
        run: |
          echo "=== Available Xcode versions ==="
          ls /Applications/ | grep -i Xcode
          if [ -d "/Applications/Xcode_26.0.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.0.app/Contents/Developer
            echo "Selected Xcode 26.0"
          elif [ -d "/Applications/Xcode_26.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.app/Contents/Developer
            echo "Selected Xcode 26"
          else
            LATEST=$(ls /Applications/ | grep -i "Xcode_" | sort -V | tail -1)
            if [ -n "$LATEST" ]; then
              sudo xcode-select -s /Applications/$LATEST/Contents/Developer
              echo "Selected $LATEST"
            fi
          fi
          xcodebuild -version
      
      - name: Install Apple Certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: "1234"
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          
          echo "$BUILD_CERTIFICATE_BASE64" | tr -d '\n ' | base64 --decode --output "$CERTIFICATE_PATH"
          
          security create-keychain -p "buildpassword" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "buildpassword" "$KEYCHAIN_PATH"
          
          security import "$CERTIFICATE_PATH" -k "$KEYCHAIN_PATH" -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/xcodebuild
          
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "buildpassword" "$KEYCHAIN_PATH"
          
          security list-keychains -d user -s "$KEYCHAIN_PATH"
      
      - name: Install Provisioning Profile
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo "$BUILD_PROVISION_PROFILE_BASE64" | tr -d '\n ' | base64 --decode --output "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/
      
      - name: System Environment Setup
        run: npm install -g cordova@12.0.0 --force
      
      - name: Prepare Platform
        run: |
          cordova platform add ios --non-interactive
      
      - name: Force iPad Compliance
        run: |
          PLIST_PATH=$(find platforms/ios -name "*-Info.plist" | head -n 1)
          if [ -f "$PLIST_PATH" ]; then
            /usr/libexec/PlistBuddy -c "Add :UIRequiresFullScreen bool true" "$PLIST_PATH" || /usr/libexec/PlistBuddy -c "Set :UIRequiresFullScreen true" "$PLIST_PATH"
            echo "Successfully patched $PLIST_PATH"
          fi
      
      - name: Build Signed App
        run: |
          cordova build ios --release --device --buildConfig=build.json --non-interactive
      
      - name: Locate and Verify IPA
        id: find_ipa
        run: |
          IPA_PATH=$(find platforms/ios -name "*.ipa" | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "ERROR: IPA file not found"
            exit 1
          fi
          echo "ipa_path=$IPA_PATH" >> $GITHUB_OUTPUT
          echo "Found IPA: $IPA_PATH"
      
      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: "${{ steps.find_ipa.outputs.ipa_path }}"
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
      
      - name: Upload Artifact (Backup)
        uses: actions/upload-artifact@v4
        with:
          name: Production-Homerun-App
          path: "${{ steps.find_ipa.outputs.ipa_path }}"
