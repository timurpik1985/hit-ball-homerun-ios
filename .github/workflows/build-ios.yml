name: Build iOS App
on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Hard Reset Environment
        run: |
          # 1. Kill the folders that are poisoning the build with old settings
          rm -rf ~/.cordova
          rm -rf ~/.config/configstore/cordova-config.json
          
          # 2. Pre-create a silent config so it never asks about telemetry
          mkdir -p ~/.cordova
          echo '{"telemetry": false}' > ~/.cordova/config.json

      - name: Install Stable Cordova
        # We use 12.0.0 because it matches the Node 18 runner perfectly.
        # This stops the 'EBADENGINE' warnings and the telemetry crash.
        run: npm install -g cordova@12.0.0 --force

      - name: Build App
        env:
          CORDOVA_TELEMETRY_OPT_OUT: 1
        run: |
          # Use --non-interactive to bypass all prompts
          cordova platform add ios --non-interactive
          cordova build ios --non-interactive
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: platforms/ios/build/
