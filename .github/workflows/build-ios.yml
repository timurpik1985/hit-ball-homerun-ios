name: Build iOS App
on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Hard Reset Environment
        run: |
          # 1. Force remove the configuration stores that trigger the telemetry bug
          rm -rf ~/.cordova
          rm -rf ~/.config/configstore/cordova-config.json
          
          # 2. Create a clean, silent config file
          mkdir -p ~/.cordova
          echo '{"telemetry": false}' > ~/.cordova/config.json

      - name: Install Compatible Cordova
        # We use 12.0.0 because it is natively compatible with Node 18.
        # This prevents the 'Unsupported engine' warnings and the telemetry crash.
        run: npm install -g cordova@12.0.0 --force

      - name: Build iOS App
        env:
          CORDOVA_TELEMETRY_OPT_OUT: 1
          CI: true
        run: |
          # We run these as separate steps to ensure clarity in the logs
          cordova platform add ios --non-interactive
          cordova build ios --non-interactive

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: platforms/ios/build/
