name: Build and Sign iOS App

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Stable Xcode
        run: |
          echo "=== Available Xcode versions ==="
          ls /Applications/ | grep -i Xcode || true

          if [ -d "/Applications/Xcode_16.4.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer
            echo "Selected Xcode 16.4"
          elif [ -d "/Applications/Xcode_16.3.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer
            echo "Selected Xcode 16.3"
          elif [ -d "/Applications/Xcode_16.2.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
            echo "Selected Xcode 16.2"
          elif [ -d "/Applications/Xcode_16.1.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer
            echo "Selected Xcode 16.1"
          else
            echo "ERROR: Xcode 16.x not found"
            ls /Applications/ | grep -i Xcode || true
            exit 1
          fi

          xcodebuild -version

      - name: Install Apple Certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: "1234"
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo "$BUILD_CERTIFICATE_BASE64" | tr -d '\n ' | base64 --decode --output "$CERTIFICATE_PATH"

          security create-keychain -p "buildpassword" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "buildpassword" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" -k "$KEYCHAIN_PATH" -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "buildpassword" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

      - name: Install Provisioning Profile
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo "$BUILD_PROVISION_PROFILE_BASE64" | tr -d '\n ' | base64 --decode --output "$PP_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

          security cms -D -i "$PP_PATH" > "$RUNNER_TEMP/profile.plist"
          UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$RUNNER_TEMP/profile.plist")
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision

          echo "Installed provisioning profile UUID: $UUID"

      - name: System Environment Setup
        run: |
          npm install -g cordova@12.0.0 --force
          cordova --version
          node --version
          npm --version

      - name: Prepare Platform
        run: |
          rm -rf platforms plugins
          cordova platform add ios@7.1.1 --non-interactive

      - name: Patch AdMob Plus Swift Compatibility
        run: |
          echo "Patching all admob-plus-cordova Swift files..."

          ADMOB_DIR=$(find platforms/ios -path "*/Plugins/admob-plus-cordova" -type d | head -n 1)

          if [ -z "$ADMOB_DIR" ]; then
            echo "ERROR: admob-plus-cordova plugin directory not found."
            find platforms/ios -path "*admob*" -type f || true
            exit 1
          fi

          echo "AdMob plugin dir: $ADMOB_DIR"

          # Cordova callbackId optional compatibility.
          find "$ADMOB_DIR" -name "*.swift" -print0 | xargs -0 perl -0pi -e 's/callbackId: command\.callbackId\)/callbackId: command.callbackId!\)/g'

          # IMPORTANT FOR XCODE 16.2 / CORDOVA IOS 7.1.1:
          # CDVPluginResult(...) is optional here, so keep optional chaining.
          # Previous workflow converted result?. to result. and caused:
          # "value of optional type 'CDVPluginResult?' must be unwrapped..."
          find "$ADMOB_DIR" -name "*.swift" -print0 | xargs -0 perl -0pi -e 's/result\.setKeepCallbackAs\(true\)/result?.setKeepCallbackAs(true)/g'
          find "$ADMOB_DIR" -name "*.swift" -print0 | xargs -0 perl -0pi -e 's/result\?\.setKeepCallbackAs\(true\)/result?.setKeepCallbackAs(true)/g'

          # Keep old Cordova enum. Xcode 16/Cordova headers accept it; changing it is not needed.
          # If the plugin has already been patched to CDVCommandStatus.ok, keep it as-is.
          # Do not force this conversion anymore.

          # Cordova viewController optional compatibility for Google Mobile Ads present(...) calls.
          find "$ADMOB_DIR" -name "*.swift" -print0 | xargs -0 perl -0pi -e 's/fromRootViewController: plugin\.viewController/fromRootViewController: plugin.viewController!/g'
          find "$ADMOB_DIR" -name "*.swift" -print0 | xargs -0 perl -0pi -e 's/rootViewController: plugin\.viewController/rootViewController: plugin.viewController!/g'

          echo "Patch confirmation:"
          grep -RIn "command.callbackId" "$ADMOB_DIR" || true
          grep -RIn "setKeepCallbackAs" "$ADMOB_DIR" || true
          grep -RIn "CDVPluginResult(status" "$ADMOB_DIR" || true
          grep -RIn "viewController!" "$ADMOB_DIR" || true

      - name: Stabilize Swift Release Build
        run: |
          echo "Disabling Swift Release optimization to avoid Swift compiler crash in admob-plus-cordova."

          PBXPROJ=$(find platforms/ios -name "project.pbxproj" | head -n 1)
          if [ -z "$PBXPROJ" ]; then
            echo "ERROR: project.pbxproj not found"
            exit 1
          fi

          echo "Patching project: $PBXPROJ"

          perl -0pi -e 's/SWIFT_OPTIMIZATION_LEVEL = "-O";/SWIFT_OPTIMIZATION_LEVEL = "-Onone";/g' "$PBXPROJ"
          perl -0pi -e 's/SWIFT_OPTIMIZATION_LEVEL = "-Owholemodule";/SWIFT_OPTIMIZATION_LEVEL = "-Onone";/g' "$PBXPROJ"
          perl -0pi -e 's/SWIFT_COMPILATION_MODE = wholemodule;/SWIFT_COMPILATION_MODE = singlefile;/g' "$PBXPROJ"
          perl -0pi -e 's/ONLY_ACTIVE_ARCH = NO;/ONLY_ACTIVE_ARCH = YES;/g' "$PBXPROJ"

          perl -0pi -e 's/IPHONEOS_DEPLOYMENT_TARGET = 11\.0;/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/g' "$PBXPROJ"
          perl -0pi -e 's/IPHONEOS_DEPLOYMENT_TARGET = 12\.0;/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/g' "$PBXPROJ"

          echo "Swift settings after patch:"
          grep -n "SWIFT_OPTIMIZATION_LEVEL\|SWIFT_COMPILATION_MODE\|IPHONEOS_DEPLOYMENT_TARGET" "$PBXPROJ" | head -80 || true

      - name: Verify ATT and AdMob Plist Keys
        run: |
          PLIST_PATH=$(find platforms/ios -name "*-Info.plist" | head -n 1)
          echo "Checking plist: $PLIST_PATH"

          echo "NSUserTrackingUsageDescription:"
          /usr/libexec/PlistBuddy -c "Print :NSUserTrackingUsageDescription" "$PLIST_PATH"

          echo "GADApplicationIdentifier:"
          /usr/libexec/PlistBuddy -c "Print :GADApplicationIdentifier" "$PLIST_PATH"

      - name: Force iPad Compliance
        run: |
          PLIST_PATH=$(find platforms/ios -name "*-Info.plist" | head -n 1)
          if [ -f "$PLIST_PATH" ]; then
            /usr/libexec/PlistBuddy -c "Add :UIRequiresFullScreen bool true" "$PLIST_PATH" || /usr/libexec/PlistBuddy -c "Set :UIRequiresFullScreen true" "$PLIST_PATH"
            echo "Successfully patched $PLIST_PATH"
          fi

      - name: Build Signed App
        run: |
          set -o pipefail
          touch "$RUNNER_TEMP/cordova-build.log"

          cordova build ios --release --device --buildConfig=build.json --non-interactive \
            --buildFlag="SWIFT_OPTIMIZATION_LEVEL=-Onone" \
            --buildFlag="SWIFT_COMPILATION_MODE=singlefile" \
            --buildFlag="COMPILER_INDEX_STORE_ENABLE=NO" \
            2>&1 | tee "$RUNNER_TEMP/cordova-build.log"

      - name: Print Build Errors If Failed
        if: failure()
        run: |
          echo "=== Swift/Xcode errors from build log ==="
          grep -n -i -C 12 "error:" "$RUNNER_TEMP/cordova-build.log" || true
          grep -n -i -C 12 "segmentation" "$RUNNER_TEMP/cordova-build.log" || true
          grep -n -i -C 12 "signal" "$RUNNER_TEMP/cordova-build.log" || true
          grep -n -i -C 12 "value of optional" "$RUNNER_TEMP/cordova-build.log" || true
          grep -n -i -C 12 "cannot use optional" "$RUNNER_TEMP/cordova-build.log" || true
          grep -n -i -C 12 "failed" "$RUNNER_TEMP/cordova-build.log" || true

      - name: Upload Build Log If Failed
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-ios-build-log
          path: ${{ runner.temp }}/cordova-build.log

      - name: Locate and Verify IPA
        id: find_ipa
        run: |
          IPA_PATH=$(find platforms/ios -name "*.ipa" | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "ERROR: IPA file not found"
            exit 1
          fi

          echo "ipa_path=$IPA_PATH" >> $GITHUB_OUTPUT
          echo "Found IPA: $IPA_PATH"
          ls -lh "$IPA_PATH"

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: "${{ steps.find_ipa.outputs.ipa_path }}"
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}

      - name: Upload Artifact Backup
        uses: actions/upload-artifact@v4
        with:
          name: Production-Homerun-App
          path: "${{ steps.find_ipa.outputs.ipa_path }}"
