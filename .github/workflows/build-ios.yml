name: Build iOS App
on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Debug Node
        run: |
          which node
          node -v

      - name: Install dependencies
        run: npm install

      - name: Disable telemetry
        run: |
          mkdir -p ~/.cordova
          echo '{ "telemetry": false }' > ~/.cordova/config.json

      - name: Build App (forced Node 20)
        run: |
          npx -p node@20 -p cordova@12 cordova platform add ios --non-interactive
          npx -p node@20 -p cordova@12 cordova build ios --non-interactive
