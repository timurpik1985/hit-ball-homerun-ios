name: Build and Sign iOS App
on:
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Apple Certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          # 1. Create temporary paths
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # 2. Decode the P12 secret into a file
          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode --output "$CERTIFICATE_PATH"

          # 3. Create a temporary keychain for the build
          security create-keychain -p "buildpassword" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "buildpassword" "$KEYCHAIN_PATH"

          # 4. Import the certificate with the P12 password
          # The quotes around "$P12_PASSWORD" are critical to avoid shell errors
          security import "$CERTIFICATE_PATH" -k "$KEYCHAIN_PATH" -P "$P12_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN_PATH"

      - name: Install Provisioning Profile
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode --output "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: System Environment Setup
        run: |
          # Clear potential telemetry hang-ups
          rm -rf ~/.cordova
          mkdir -p ~/.cordova
          echo '{"telemetry": false}' > ~/.cordova/config.json
          # Install Cordova 12.0.0
          npm install -g cordova@12.0.0 --force

      - name: Build Signed App
        env:
          CORDOVA_TELEMETRY_OPT_OUT: 1
        run: |
          # Add the iOS platform
          cordova platform add ios --non-interactive
          
          # Build the IPA using the Apple Distribution certificate and the profile name
          # Replace 'Homerun_App_Store' with the exact name you gave the profile at Apple
          cordova build ios --release --device \
            --codeSignIdentity="Apple Distribution" \
            --provisioningProfile="Homerun_App_Store" \
            --non-interactive

      - name: Upload Signed IPA
        uses: actions/upload-artifact@v4
        with:
          name: Production-Homerun-App
          path: platforms/ios/build/device/*.ipa
