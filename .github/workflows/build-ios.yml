name: Build and Sign iOS App

on:
  workflow_dispatch:

jobs:
  build-ios:
    # Use macOS 14 because the current macOS 15 runner is selecting Xcode 26,
    # and admob-plus-cordova is failing in Swift compilation with Xcode 26.
    runs-on: macos-14

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          echo "=== Available Xcode versions ==="
          ls /Applications/ | grep -i Xcode || true

          if [ -d "/Applications/Xcode_16.4.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer
            echo "Selected Xcode 16.4"
          elif [ -d "/Applications/Xcode_16.3.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer
            echo "Selected Xcode 16.3"
          elif [ -d "/Applications/Xcode_16.2.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
            echo "Selected Xcode 16.2"
          elif [ -d "/Applications/Xcode_16.1.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer
            echo "Selected Xcode 16.1"
          else
            echo "ERROR: Xcode 16.x not found on this runner. Do not build this plugin with Xcode 26."
            exit 1
          fi

          xcodebuild -version

      - name: Install Apple Certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: "1234"
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo "$BUILD_CERTIFICATE_BASE64" | tr -d '\n ' | base64 --decode --output "$CERTIFICATE_PATH"

          security create-keychain -p "buildpassword" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "buildpassword" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" -k "$KEYCHAIN_PATH" -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "buildpassword" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

      - name: Install Provisioning Profile
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo "$BUILD_PROVISION_PROFILE_BASE64" | tr -d '\n ' | base64 --decode --output "$PP_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          security cms -D -i "$PP_PATH" > "$RUNNER_TEMP/profile.plist"
          UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$RUNNER_TEMP/profile.plist")
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          echo "Installed provisioning profile UUID: $UUID"

      - name: System Environment Setup
        run: |
          npm install -g cordova@12.0.0 --force
          cordova --version
          node --version
          npm --version

      - name: Prepare Platform
        run: |
          rm -rf platforms plugins
          cordova platform add ios@7.1.1 --non-interactive

      - name: Patch AdMob Plus Swift Compatibility
        run: |
          echo "Patching admob-plus-cordova Swift files..."

          AMB_CONTEXT=$(find platforms/ios -path "*/Plugins/admob-plus-cordova/AMBContext.swift" | head -n 1)
          AMB_PLUGIN=$(find platforms/ios -path "*/Plugins/admob-plus-cordova/AMBPlugin.swift" | head -n 1)

          if [ -z "$AMB_CONTEXT" ] || [ -z "$AMB_PLUGIN" ]; then
            echo "ERROR: admob-plus-cordova Swift files not found."
            find platforms/ios -path "*admob*" -type f || true
            exit 1
          fi

          echo "Found AMBContext: $AMB_CONTEXT"
          echo "Found AMBPlugin: $AMB_PLUGIN"

          perl -0pi -e 's/self\.commandDelegate\.send\(message, callbackId: command\.callbackId\)/self.commandDelegate.send(message, callbackId: command.callbackId!)/g' "$AMB_CONTEXT"
          perl -0pi -e 's/result\?\.setKeepCallbackAs\(true\)/result.setKeepCallbackAs(true)/g' "$AMB_PLUGIN"
          perl -0pi -e 's/CDVCommandStatus_OK/CDVCommandStatus.ok/g' "$AMB_PLUGIN"

          echo "Patch confirmation:"
          grep -n "commandDelegate.send(message" "$AMB_CONTEXT" || true
          grep -n "setKeepCallbackAs" "$AMB_PLUGIN" || true
          grep -n "CDVPluginResult(status" "$AMB_PLUGIN" || true

      - name: Verify ATT and AdMob Plist Keys
        run: |
          PLIST_PATH=$(find platforms/ios -name "*-Info.plist" | head -n 1)
          echo "Checking plist: $PLIST_PATH"
          /usr/libexec/PlistBuddy -c "Print :NSUserTrackingUsageDescription" "$PLIST_PATH"
          /usr/libexec/PlistBuddy -c "Print :GADApplicationIdentifier" "$PLIST_PATH"

      - name: Force iPad Compliance
        run: |
          PLIST_PATH=$(find platforms/ios -name "*-Info.plist" | head -n 1)
          if [ -f "$PLIST_PATH" ]; then
            /usr/libexec/PlistBuddy -c "Add :UIRequiresFullScreen bool true" "$PLIST_PATH" || /usr/libexec/PlistBuddy -c "Set :UIRequiresFullScreen true" "$PLIST_PATH"
            echo "Successfully patched $PLIST_PATH"
          fi

      - name: Build Signed App
        run: |
          set -o pipefail
          cordova build ios --release --device --buildConfig=build.json --non-interactive 2>&1 | tee "$RUNNER_TEMP/cordova-build.log"

      - name: Print Build Errors If Failed
        if: failure()
        run: |
          echo "=== Build errors ==="
          grep -n -i -C 6 "error:" "$RUNNER_TEMP/cordova-build.log" || true
          grep -n -i -C 6 "failed" "$RUNNER_TEMP/cordova-build.log" || true
          echo "=== Selected Xcode ==="
          xcodebuild -version || true

      - name: Locate and Verify IPA
        id: find_ipa
        run: |
          IPA_PATH=$(find platforms/ios -name "*.ipa" | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "ERROR: IPA file not found"
            exit 1
          fi
          echo "ipa_path=$IPA_PATH" >> $GITHUB_OUTPUT
          echo "Found IPA: $IPA_PATH"
          ls -lh "$IPA_PATH"

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: "${{ steps.find_ipa.outputs.ipa_path }}"
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}

      - name: Upload Artifact Backup
        uses: actions/upload-artifact@v4
        with:
          name: Production-Homerun-App
          path: "${{ steps.find_ipa.outputs.ipa_path }}"
