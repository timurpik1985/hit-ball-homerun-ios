name: Build iOS App
on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Purge Poisoned Config
        run: |
          # Manually delete the config files that are triggering the telemetry crash
          rm -rf ~/.cordova
          rm -rf ~/.config/configstore/cordova-config.json
          # Create a clean directory
          mkdir -p ~/.cordova
          echo '{"telemetry": false}' > ~/.cordova/config.json

      - name: Install Compatible Cordova
        # We are using 12.0.0 because it is the "Stable" path for Node 18 runners.
        # It will work perfectly with your config.xml and index.html.
        run: npm install -g cordova@12.0.0 --force

      - name: Build App
        env:
          CORDOVA_TELEMETRY_OPT_OUT: 1
          CI: true
        run: |
          # Add the platform and build without any manual telemetry commands
          cordova platform add ios --non-interactive
          cordova build ios --non-interactive
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: platforms/ios/build/
