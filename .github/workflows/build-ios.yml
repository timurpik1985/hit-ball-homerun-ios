name: Build and Sign iOS App
on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Apple Certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo "$BUILD_CERTIFICATE_BASE64" | tr -d '\n ' | base64 --decode --output "$CERTIFICATE_PATH"
          security create-keychain -p "buildpassword" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "buildpassword" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -k "$KEYCHAIN_PATH" -P 1234 -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN_PATH"

      - name: Install Provisioning Profile
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo "$BUILD_PROVISION_PROFILE_BASE64" | tr -d '\n ' | base64 --decode --output "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: System Environment Setup
        run: |
          rm -rf ~/.cordova
          mkdir -p ~/.cordova
          echo '{"telemetry": false}' > ~/.cordova/config.json
          npm install -g cordova@12.0.0 --force

      - name: Build Signed App
        env:
          CORDOVA_TELEMETRY_OPT_OUT: 1
        run: |
          cordova platform add ios --non-interactive
          cordova build ios --release --device --buildConfig=build.json --non-interactive

      - name: Upload Signed IPA
        uses: actions/upload-artifact@v4
        with:
          name: Production-Homerun-App
          # This updated path searches all possible build folders
          path: |
            platforms/ios/build/device/*.ipa
            platforms/ios/build/Release-iphoneos/*.ipa
            platforms/ios/remote/*.ipa
          if-no-files-found: error
