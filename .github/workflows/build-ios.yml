name: Build iOS App
on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: System Hard Reset
        run: |
          # Delete any hidden config folders that cause the 'telemetry' crash
          rm -rf ~/.cordova
          rm -rf ~/.config/configstore/cordova-config.json
          # Create a fresh, empty config so Cordova doesn't try to prompt you
          mkdir -p ~/.cordova
          echo '{"telemetry": false}' > ~/.cordova/config.json

      - name: Install Stable Cordova
        # We use 12.0.0 because it is the most stable version for Node 18.
        # This avoids the 'Cordova does not know telemetry' error entirely.
        run: npm install -g cordova@12.0.0 --force

      - name: Build App
        # These environment variables tell Cordova to stay silent
        env:
          CORDOVA_TELEMETRY_OPT_OUT: 1
          CI: true
        run: |
          # 1. Add the iOS platform
          cordova platform add ios --non-interactive
          # 2. Run the build
          cordova build ios --non-interactive

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: platforms/ios/build/
