name: Build iOS App
on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Clean Environment
        run: |
          # 1. Force remove any hidden cordova settings causing the crash
          rm -rf ~/.cordova
          rm -rf ~/.config/configstore/cordova-config.json
          
          # 2. Pre-create a clean config
          mkdir -p ~/.cordova
          echo '{"telemetry": false}' > ~/.cordova/config.json

      - name: Install Stable Cordova
        # We are using 12.0.0 because 13.0.0 + Node 18 = Permanent Error.
        # This version will actually work with the Node 18 on your runner.
        run: npm install -g cordova@12.0.0 --force

      - name: Build App
        env:
          CORDOVA_TELEMETRY_OPT_OUT: 1
          CI: true
        run: |
          # We use --non-interactive to skip all prompts
          cordova platform add ios --non-interactive
          cordova build ios --non-interactive
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: platforms/ios/build/
