name: Build iOS App
on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          check-latest: true

      - name: Install Cordova
        # We install it globally so it's ready to use
        run: npm install -g cordova@latest --force

      - name: Build App
        # This ENV block tells Cordova to stay quiet without crashing.
        # DO NOT add a separate "Disable telemetry" step.
        env:
          CORDOVA_TELEMETRY_OPT_OUT: 1
        run: |
          # 1. Add the iOS platform
          cordova platform add ios --non-interactive
          
          # 2. Run the build
          cordova build ios --non-interactive

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: platforms/ios/build/
