name: Build iOS App
on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Force Node 22 & Purge Telemetry
        run: |
          # 1. Force Node 22 using Homebrew path injection
          echo "$(brew --prefix node@22)/bin" >> $GITHUB_PATH
          
          # 2. DELETE the telemetry config that causes the crash
          rm -rf ~/.cordova
          rm -rf ~/.config/configstore/cordova-config.json
          
          # 3. Create a blank config so Cordova doesn't try to create one
          mkdir -p ~/.cordova
          echo "{}" > ~/.cordova/config.json

      - name: Verify Environment
        run: |
          node -v
          # If this doesn't show v22, the next step uses a fallback

      - name: Install and Build
        env:
          CORDOVA_TELEMETRY_OPT_OUT: 1
          CI: true
        run: |
          # We use npx to ensure we are using the Node version we just forced
          npm install -g cordova@latest --force
          
          # CRITICAL: We run these with the --no-telemetry style logic
          cordova platform add ios --non-interactive --no-update-notifier
          cordova build ios --non-interactive --no-update-notifier

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: platforms/ios/build/
